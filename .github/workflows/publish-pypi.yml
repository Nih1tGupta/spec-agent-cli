name: Publish to PyPI

# spec: CLI-012

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.3.0
      - name: Build package
        run: uv build
      - name: Publish to PyPI
        run: uv publish
