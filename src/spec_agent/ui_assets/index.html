<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spec Agent · Specification workspace</title>
  <style>
    :root { --ink:#101828; --muted:#667085; --line:#e4e7ec; --lime:#a3e635; --lime-strong:#84cc16; --wash:#f5fbe9; --code:#14251d; --paper:#fff; }
    * { box-sizing:border-box; } html,body { margin:0; min-height:100%; background:var(--paper); color:var(--ink); font:14px/1.55 Inter,ui-sans-serif,system-ui,-apple-system,sans-serif; }
    button { font:inherit; } .app { min-height:100vh; display:grid; grid-template-rows:72px 1fr; }
    header { display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--line); padding:0 38px; background:#fff; }
    .brand { display:flex; align-items:center; gap:10px; font-size:17px; letter-spacing:-.03em; } .brand-mark { width:28px; height:28px; border-radius:50% 42% 55% 45%; background:var(--lime); position:relative; } .brand-mark:after { content:""; position:absolute; inset:7px; border:2px solid var(--ink); border-radius:50%; }
    .brand small { color:var(--muted); font-size:12px; font-weight:400; } .header-meta { color:var(--muted); font-size:12px; display:flex; align-items:center; gap:18px; } .readonly { color:#3f6212; background:var(--wash); border:1px solid #d9f99d; border-radius:999px; padding:5px 9px; font-size:11px; }
    .workspace { min-height:0; display:grid; grid-template-columns:280px minmax(420px,1fr) 430px; }
    .panel { min-height:0; overflow:auto; padding:30px 26px; } .left-panel { border-right:1px solid var(--line); } .right-panel { border-left:1px solid var(--line); background:#fcfdf9; }
    .kicker { color:#65a30d; text-transform:uppercase; letter-spacing:.13em; font-size:10px; font-weight:800; } h1 { font-size:34px; line-height:1.08; letter-spacing:-.06em; margin:8px 0 8px; } h2 { font-size:18px; letter-spacing:-.03em; margin:0; } h3 { margin:0; font-size:12px; text-transform:uppercase; letter-spacing:.1em; } p { margin:0 0 12px; } .muted { color:var(--muted); } .mono { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
    .project-card { margin:16px 0 28px; padding:16px; border:1px solid var(--line); border-radius:10px; background:var(--wash); } .project-card strong { display:block; margin:4px 0; } .project-card small { color:var(--muted); word-break:break-all; }
    .section-label { display:flex; justify-content:space-between; color:var(--muted); text-transform:uppercase; letter-spacing:.11em; font-size:10px; font-weight:800; margin:0 0 9px; } .section-label span { color:var(--ink); }
    .nav { display:grid; gap:3px; margin-bottom:28px; } .nav button,.packet { border:0; text-align:left; background:transparent; color:var(--muted); border-radius:7px; padding:9px 10px; cursor:pointer; } .nav button:hover,.nav button.active,.packet:hover,.packet.active { background:var(--wash); color:var(--ink); } .nav button.active { font-weight:700; border-left:3px solid var(--lime-strong); padding-left:7px; }
    .packet-list { display:grid; gap:4px; } .packet { width:100%; border-left:3px solid transparent; } .packet.active { border-left-color:var(--lime-strong); } .packet strong { display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:13px; } .packet small { color:var(--muted); font-size:11px; }
    .lead { max-width:720px; font-size:16px; color:var(--muted); } .metric-row { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin:26px 0; } .metric { border-top:2px solid var(--lime); padding:10px 0; } .metric b { display:block; font-size:24px; letter-spacing:-.05em; } .metric span { color:var(--muted); font-size:11px; }
    .evidence-head { display:flex; align-items:start; justify-content:space-between; gap:18px; margin-top:34px; } .status { white-space:nowrap; border:1px solid #d9f99d; background:var(--wash); color:#3f6212; border-radius:999px; padding:5px 10px; font-size:11px; } .status.drift { border-color:#fecaca; background:#fff1f2; color:#be123c; }
    .tabs { display:flex; gap:18px; border-bottom:1px solid var(--line); margin:25px 0 16px; } .tab { border:0; border-bottom:2px solid transparent; padding:9px 0; background:transparent; color:var(--muted); cursor:pointer; } .tab.active { border-color:var(--lime-strong); color:var(--ink); font-weight:700; }
    .document { white-space:pre-wrap; font:12px/1.7 ui-monospace,SFMono-Regular,Menlo,monospace; color:#344054; background:#fbfcfe; border:1px solid var(--line); border-radius:8px; padding:17px; max-height:390px; overflow:auto; } .file-list { display:grid; gap:6px; } .file-button { border:1px solid var(--line); border-radius:7px; background:#fff; color:#475467; text-align:left; padding:9px 11px; cursor:pointer; font:11px ui-monospace,SFMono-Regular,Menlo,monospace; } .file-button:hover { border-color:var(--lime-strong); background:var(--wash); }
    .rule-anchor { border:1px solid #bef264; color:#3f6212; background:var(--wash); border-radius:999px; padding:7px 11px; cursor:pointer; font:12px ui-monospace,SFMono-Regular,Menlo,monospace; } .rule-anchor:hover,.rule-anchor.active { background:var(--lime); border-color:var(--lime-strong); color:var(--ink); } .rule-detail { border:1px solid #d9f99d; background:#fbfff4; border-radius:9px; padding:15px; margin:0 0 20px; } .rule-detail-head { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:10px; } .rule-detail h3 { color:var(--ink); font-size:13px; letter-spacing:0; text-transform:none; } .rule-detail p { color:#475467; font-size:13px; margin:4px 0 12px; } .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; } .detail-item { border-top:1px solid #d9f99d; padding-top:7px; min-width:0; } .detail-item small { display:block; color:#65a30d; text-transform:uppercase; letter-spacing:.08em; font-size:9px; font-weight:800; } .detail-item span { display:block; color:#475467; font:11px/1.45 ui-monospace,SFMono-Regular,Menlo,monospace; overflow-wrap:anywhere; margin-top:3px; }
    .code-window { background:#17251d; color:#dfead8; border-radius:9px; overflow:auto; max-height:520px; border:1px solid #243d2e; } .code-line { display:grid; grid-template-columns:42px 1fr; min-width:620px; font:12px/1.65 ui-monospace,SFMono-Regular,Menlo,monospace; } .code-line > span:first-child { color:#718475; text-align:right; padding-right:13px; user-select:none; } .code-line > span:last-child { padding-left:13px; white-space:pre; } .code-line.hit { background:#365323; box-shadow:inset 3px 0 var(--lime); } mark { background:transparent; color:#d9f99d; font-weight:700; }
    .history { display:grid; gap:0; } .history-item { display:grid; grid-template-columns:12px 1fr; gap:11px; position:relative; padding:0 0 16px; } .history-item:before { content:""; width:7px; height:7px; margin-top:6px; background:var(--lime-strong); border-radius:50%; z-index:1; } .history-item:after { content:""; position:absolute; left:3px; top:13px; bottom:0; width:1px; background:#d9f99d; } .history-item:last-child:after { display:none; } .history-item strong { display:block; font-size:12px; } .history-item small { display:block; color:var(--muted); font-size:11px; }
    .right-heading { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; } .side-card { border:1px solid var(--line); border-radius:10px; background:#fff; padding:16px; margin-bottom:16px; } .side-card h3 { margin-bottom:13px; } .health-line { display:flex; justify-content:space-between; margin-bottom:7px; font-size:12px; } .health-bar { height:8px; background:#eef2e8; border-radius:99px; overflow:hidden; } .health-bar span { display:block; height:100%; background:var(--lime); }
    .timeline .history-item { padding-bottom:13px; } .timeline .history-item strong { font-size:12px; } .event-id { color:#65a30d; font:11px ui-monospace,SFMono-Regular,Menlo,monospace; }
    .trace { background:var(--code); border-radius:9px; padding:15px; color:#e6f4d7; overflow:auto; } .trace pre { margin:0; color:#d9f99d; font:11px/1.55 ui-monospace,SFMono-Regular,Menlo,monospace; white-space:pre-wrap; } .trace-caption { margin-top:10px; color:#a7c5a0; font-size:11px; }
    .evolution-diagram { display:grid; gap:10px; margin-top:13px; } .evolution-row { display:grid; grid-template-columns:1.1fr 18px 1.4fr 18px 1fr; gap:7px; align-items:center; border-top:1px solid var(--line); padding-top:10px; } .evolution-row:first-child { border-top:0; padding-top:0; } .evo-event,.evo-change,.evo-rule { min-width:0; } .evo-event b,.evo-event strong,.evo-event small,.evo-change strong,.evo-change small { display:block; } .evo-event b { color:#65a30d; font-size:10px; } .evo-event strong,.evo-change strong { font-size:11px; line-height:1.35; } .evo-event small,.evo-change small { color:var(--muted); font-size:10px; line-height:1.35; margin-top:3px; } .evo-arrow { color:var(--lime-strong); font-size:18px; text-align:center; } .evo-rule span { display:inline-block; margin:2px; border:1px solid #bef264; color:#3f6212; background:var(--wash); border-radius:4px; padding:2px 4px; font:9px ui-monospace,SFMono-Regular,Menlo,monospace; }
    .trace-path { display:grid; grid-template-columns:1fr 18px 1.25fr 18px 1fr 18px 1fr; gap:5px; align-items:center; background:var(--wash); border:1px solid #d9f99d; border-radius:8px; padding:14px 10px; margin-top:13px; } .trace-path div { min-width:0; } .trace-path small,.trace-path b { display:block; } .trace-path small { color:#65a30d; font-size:9px; font-weight:800; letter-spacing:.08em; } .trace-path b { font:10px/1.35 ui-monospace,SFMono-Regular,Menlo,monospace; word-break:break-word; } .trace-path > span { color:var(--lime-strong); font-size:17px; text-align:center; }
    .mermaid { border:1px solid #d9f99d; background:var(--wash); border-radius:9px; padding:13px; } .mermaid-label { color:#3f6212; font-size:10px; text-transform:uppercase; letter-spacing:.1em; font-weight:800; margin-bottom:8px; } .diagram { height:178px; position:relative; overflow:hidden; background:#fafff2; border:1px solid #d9f99d; border-radius:7px; } .diagram svg { position:absolute; inset:0; width:100%; height:100%; } .diagram-node { position:absolute; border:1px solid #84cc16; background:#fff; border-radius:7px; padding:6px 8px; font:10px ui-monospace,SFMono-Regular,Menlo,monospace; } .n-spec { left:7%; top:12%; } .n-packet { left:39%; top:12%; } .n-rule { left:28%; top:65%; } .n-code { right:6%; top:65%; border-color:#65a30d; }
    .empty { color:var(--muted); border:1px dashed var(--line); border-radius:8px; padding:18px; text-align:center; font-size:12px; } @media(max-width:1150px){ .workspace{grid-template-columns:230px minmax(340px,1fr);} .right-panel{grid-column:1/-1;border-left:0;border-top:1px solid var(--line);} } @media(max-width:720px){ header{padding:0 16px;} .workspace{display:block;} .panel{border:0!important;border-bottom:1px solid var(--line);padding:22px 16px;} .metric-row{grid-template-columns:repeat(2,1fr);} }
  </style>
</head>
<body>
<div class="app">
  <header><div class="brand"><span class="brand-mark"></span><strong>Spec Agent</strong><small> · specification workspace</small></div><div class="header-meta"><span id="repo-path">Loading…</span><span class="readonly">READ-ONLY</span></div></header>
  <div class="workspace">
    <aside id="packet-panel" class="panel left-panel">
      <div class="kicker">Specification map</div><div class="project-card"><small>PROJECT CONTRACT</small><strong id="project-title">Loading…</strong><small id="project-status"></small></div>
      <div class="section-label">Packets <span id="packet-count">0</span></div><div id="packet-list" class="packet-list"></div>
    </aside>
    <main id="main-panel" class="panel evidence-panel"><div class="empty">Loading specification evidence…</div></main>
    <section id="visual-panel" class="panel right-panel">
      <div class="right-heading"><div><div class="kicker">Spec-driven signals</div><h2>Evidence map</h2></div><span class="readonly">LIVE FILES</span></div>
      <div id="health-card" class="side-card"></div><div id="timeline-card" class="side-card"></div><div id="trace-card" class="side-card"></div>
    </section>
  </div>
</div>
<script>
  const state={data:null,selected:null,rule:null,view:'overview',tab:'spec'}; const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); const fmt=v=>v?new Date(v).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}):'undated';
  async function load(){const r=await fetch('/api/snapshot');state.data=await r.json();state.selected=state.data.packets[0]?.slug||null;state.rule=state.data.packets[0]?.behavior_ids[0]||null;render();}
  function render(){renderNav();renderMain();renderVisuals();}
  function renderNav(){const d=state.data;document.getElementById('repo-path').textContent=d.project.path;document.getElementById('project-title').textContent=d.project.title;document.getElementById('project-status').textContent='Status: '+d.project.status;document.getElementById('packet-count').textContent=d.packets.length;document.getElementById('packet-list').innerHTML=d.packets.map(p=>`<button class="packet ${p.slug===state.selected?'active':''}" onclick="selectPacket('${esc(p.slug)}')"><strong>${esc(p.title)}</strong><small>${esc(p.status)} · ${p.behavior_ids.length} rules</small></button>`).join('')||'<div class="empty">No packets yet</div>';}
  function selectPacket(slug){state.selected=slug;const p=state.data.packets.find(x=>x.slug===slug);state.rule=p?.behavior_ids[0]||null;state.view='packet';state.tab='spec';render();}
  function ruleText(p,id,acceptance=false){const source=acceptance?p.acceptance:p.spec;const lines=source.split('\n');const index=lines.findIndex(line=>line.includes(id));if(index<0)return acceptance?'No acceptance text references this rule.':'Rule text is not available in the packet source.';return lines.slice(index,Math.min(index+3,lines.length)).join(' ').replace(/\s+/g,' ').trim();}
  function renderRuleDetail(p,id){const files=p.behavior_links?.[id]||[];const eventIds=p.events||[];return `<div class="rule-detail"><div class="rule-detail-head"><h3>${esc(id)} · rule detail</h3><span class="status">${files.length?'linked':'unlinked'}</span></div><p>${esc(ruleText(p,id))}</p><div class="detail-grid"><div class="detail-item"><small>Acceptance reference</small><span>${esc(ruleText(p,id,true))}</span></div><div class="detail-item"><small>Defined in</small><span>spec/packets/${esc(p.slug)}/spec.md</span></div><div class="detail-item"><small>Implementation backlinks</small><span>${files.length?files.map(esc).join(', '):'No backlink recorded'}</span></div><div class="detail-item"><small>Related evolution events</small><span>${eventIds.length?eventIds.map(esc).join(', '):'No linked event'}</span></div></div></div>`;}
  function toggleRule(id){state.rule=id;renderMain();}
  function renderMain(){const d=state.data,p=d.packets.find(x=>x.slug===state.selected);if(state.view==='timeline')return renderTimelinePage();if(state.view==='drift')return renderDriftPage();if(!p){state.selected=d.packets[0]?.slug||null;return renderMain();}state.rule=state.rule&&p.behavior_ids.includes(state.rule)?state.rule:p.behavior_ids[0];const rules=p.behavior_ids.map(id=>`<button class="rule-anchor ${id===state.rule?'active':''}" onclick="toggleRule('${esc(id)}')">${esc(id)}</button>`).join('');document.getElementById('main-panel').innerHTML=`<div class="kicker">Implementation evidence</div><div class="evidence-head"><div><h1>${esc(p.title)}</h1><p class="lead">Select a rule to inspect its definition, acceptance reference, backlinks, and related evolution evidence.</p></div><span class="status">${esc(p.status)}</span></div><div class="metric-row"><div class="metric"><b>${p.behavior_ids.length}</b><span>rules</span></div><div class="metric"><b>${p.linked_files.length}</b><span>code files</span></div><div class="metric"><b>${p.events.length}</b><span>events</span></div><div class="metric"><b>${d.drift.issues.filter(i=>p.behavior_ids.includes(i.behavior_id)).length}</b><span>drift findings</span></div></div><div class="section-label">Rule anchors <span>${p.behavior_ids.length}</span></div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">${rules||'<span class="muted">No behavior IDs linked.</span>'}</div>${state.rule?renderRuleDetail(p,state.rule):''}<div class="section-label">Linked implementation <span>${p.linked_files.length} files</span></div><div class="file-list">${p.linked_files.map((f,i)=>`<button class="file-button" onclick="loadFile('${esc(f)}')">${i===0?'▶ ':'↳ '}${esc(f)}</button>`).join('')||'<div class="empty">No linked implementation evidence yet.</div>'}</div><div id="code-preview" class="code-window" style="margin-top:12px">${p.linked_files.length?'Loading highlighted backlinks…':'No code to display.'}</div>`;if(p.linked_files[0])loadFile(p.linked_files[0]);}
  function setTab(t){state.tab=t;renderMain();} async function loadFile(path){const e=document.getElementById('code-preview');if(!e)return;e.textContent='Loading '+path+'…';try{const r=await fetch('/api/file?path='+encodeURIComponent(path));const j=await r.json();e.textContent=j.content||j.error||'No readable content.';}catch(x){e.textContent='Unable to load file: '+x;}}
  function renderTimelinePage(){const d=state.data;document.getElementById('main-panel').innerHTML=`<div class="kicker">Decision history</div><h1>Specification evolution</h1><p class="lead">A chronological record of the product decisions that shaped the current packets.</p><div class="side-card"><div class="history">${d.events.map(e=>`<div class="history-item"><div><strong>${esc(e.title||e.id)}</strong><small><span class="event-id">${esc(e.id||'event')}</span> · ${fmt(e.timestamp)} · ${esc(e.task_type||'decision')}</small><p class="muted">${esc(e.user_intent||e.rationale||'')}</p></div></div>`).join('')||'<div class="empty">No evolution events recorded.</div>'}</div></div>`;}
  function renderDriftPage(){const d=state.data;document.getElementById('main-panel').innerHTML=`<div class="kicker">Evidence review</div><h1>Drift & traceability</h1><p class="lead">Structural checks show whether approved behavior rules still have matching implementation evidence.</p><div class="side-card"><div class="health-line"><strong>Structural drift</strong><span class="status ${d.drift.status==='drift'?'drift':''}">${esc(d.drift.status)}</span></div>${d.drift.issues.length?d.drift.issues.map(i=>`<div class="history-item"><div><strong>${esc(i.kind)} · ${esc(i.behavior_id)}</strong><small>${esc(i.location)} · ${esc(i.message)}</small></div></div>`).join(''):'<div class="empty">No structural drift detected.</div>'}</div><div class="side-card"><h3>Traceability baseline</h3><div class="metric-row"><div class="metric"><b>${d.traceability.behavior_count}</b><span>behaviors</span></div><div class="metric"><b>${d.traceability.linked_file_count}</b><span>files</span></div></div></div>`;}
  function renderVisuals(){const d=state.data,selected=d.packets.find(p=>p.slug===state.selected),events=selected?.event_details?.length?selected.event_details:d.events.slice(0,6);document.getElementById('health-card').innerHTML=`<h3>Evidence status</h3><div class="health-line"><span>Traceability</span><strong>${d.drift.status}</strong></div><div class="health-bar"><span style="width:${d.drift.status==='clean'?100:35}%"></span></div><p class="muted" style="margin-top:10px;font-size:11px">${d.traceability.behavior_count} behavior IDs · ${d.traceability.linked_file_count} linked files · ${d.drift.issues.length} drift findings</p>`;document.getElementById('timeline-card').innerHTML=`<h3>Spec Evolution: event → change → rule</h3><div class="evolution-diagram">${events.map(e=>`<div class="evolution-row"><div class="evo-event"><b>${fmt(e.timestamp)}</b><strong>${esc(e.title||e.id)}</strong><small>${esc(e.id||'event')}</small></div><div class="evo-arrow">→</div><div class="evo-change"><strong>${esc(e.spec_delta||'Specification decision recorded')}</strong><small>${esc(e.rationale||e.user_intent||'No rationale recorded')}</small></div><div class="evo-arrow">→</div><div class="evo-rule">${(e.behavior_ids||[]).slice(0,3).map(id=>`<span>${esc(id)}</span>`).join('')||'<small>linked rule</small>'}</div></div>`).join('')||'<div class="empty">No evolution events linked to this packet.</div>'}</div>`;document.getElementById('trace-card').innerHTML=`<h3>What this packet became</h3><div class="trace-path"><div><small>AUTHORED</small><b>spec.md</b></div><span>→</span><div><small>DECISION</small><b>${esc(selected?.event_details?.[0]?.id||'event')}</b></div><span>→</span><div><small>RULES</small><b>${selected?.behavior_ids.slice(0,2).map(esc).join('<br>')||'behavior IDs'}</b></div><span>→</span><div><small>OBSERVED</small><b>${selected?.linked_files.length||0} code files</b></div></div><p class="trace-caption">This is the traceability chain: authored specification, recorded event, stable behavior rules, and observable implementation backlinks.</p>`;}
  document.querySelectorAll('.nav button').forEach(b=>b.addEventListener('click',()=>{state.view=b.dataset.view;state.selected=state.view==='overview'?null:state.selected;render();}));load().catch(e=>document.getElementById('main-panel').innerHTML=`<div class="empty">Unable to load workspace: ${esc(e)}</div>`);
</script>
</body>
</html>
